<!doctype html>
<html>
<head>
  <meta charset="utf-8"/>
  <title>PROIDU FEDERAL CORE</title>
</head>
<body style="background:#0B0F14;color:#EAF0FF;font-family:Arial">
  <h1>PROIDU FEDERAL CORE V2</h1>
  <input id="q" placeholder="вуз / баллы / шифр" style="padding:10px;width:300px"/>
  <button onclick="search()">поиск</button>
  <pre id="out"></pre>

<script>
async function search(){
  const q = document.getElementById('q').value;
  const res = await fetch('/api/search?q=' + encodeURIComponent(q));
  const data = await res.json();
  document.getElementById('out').innerText = JSON.stringify(data,null,2);
}
</script>
</body>
</html>
