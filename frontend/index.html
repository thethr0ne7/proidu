<body style="background:#0b0f14;color:white;font-family:system-ui">

  <input id='q' placeholder='поиск вузов...'/>
  <button onclick='search()'>search</button>
  <pre id='out'></pre>

<script>
async function search(){
 const q=document.getElementById('q').value;
 const res=await fetch('https://hgivyjjethjwswjrvroy.functions.supabase.co/search?q='+q);

 document.getElementById('out').innerText=JSON.stringify(data,null,2);
}
</script>
